<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- DaisyUI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <main class="container mx-auto">
        <h2 class="text-[#4ade80] font-bold text-4xl text-center my-5">Choose Your Trees</h2>

        <section class="grid grid-cols-4 gap-8">
            <!-- Categories -->
            <div class="bg-white card card-body shadow-2xl col-span-1">
                <h2 class="font-bold text-2xl">Categories</h2>
                <div class="space-y-3 sticky top-8 my-3">
                    <button class="btn btn-active btn-success w-full" id="allTreesBtn">All Trees</button>
                    <div class="space-y-3" id="categoriesContainer"></div>
                </div>
            </div>

            <!-- Trees Section -->
            <div class="bg-white card card-body shadow-2xl col-span-2">
                <div id="treesContainer" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>
                <div id="loading-spinner" class="h-[60vh] flex hidden justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>

            <!-- Cart Section -->
            <div class="bg-white card card-body shadow-2xl col-span-1">
                Cart
            </div>
        </section>

        <!-- Product Details Modal -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
        <dialog id="tree-details-modal" class="modal">
            <div class="modal-box">

                <div class="flex justify-between items-start mb-4">
                    <h3 class="font-bold text-2xl text-green-700" id="modalTitle">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('tree-details-modal').close()">✕</button>
                </div>

                <!-- Modal Content -->
                <div class=" gap-6">
                    <!-- Plant Image -->
                    <img id="modalImage" src="" alt="plant" class="w-full h-[250px]! object-cover rounded-lg mb-12">

                    <!-- Plant Details -->
                    <div class="">
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category:</span>
                            <span id="modalCategory" class="badge badge-primary"></span>
                        </p>
                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modalDescription"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-green-600">$<span id="modalPrice">0</span></span>
                        </div>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>

    <script src="./script.js"></script>
</body>

</html>
